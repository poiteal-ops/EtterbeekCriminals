@let t = translation.t();

<div class="hero-wrap">
  <div class="hero">
    <img src="assets/images/hero-sawito-le-criminel.png" alt="Sawito and Le Criminel" />
    <div class="hero-fade"></div>

    <div class="stamp">
      {{ t.home.wanted }}
      <div class="stamp-file">{{ t.home.fileNo }}</div>
    </div>

    <div class="badge">
      <div>
        <div class="badge-ttc">TTC</div>
        <div class="badge-est">EST. 2024</div>
      </div>
    </div>
  </div>
</div>

<div class="title-block">
  <div class="title">THE THIEFFRY<br />CRIMINALS</div>
  <div class="tagline">{{ t.home.tagline }}</div>
</div>

<div class="intro-block">
  <div class="kicker">{{ t.home.kicker }}</div>
  <div class="intro">{{ t.home.intro }}</div>
</div>

<div class="promo-wrap">
  <a class="promo" routerLink="/shop">
    <div class="promo-photo">
      <img src="assets/images/shop-brux-gang.jpg" alt="Brux Gang mixtape cover" />
    </div>
    <div class="promo-details">
      <div class="promo-kicker">{{ t.home.promoKicker }}</div>
      <div class="promo-title">{{ t.home.promoTitle }}</div>
      <div class="promo-tag">{{ t.home.promoTag }}</div>
      <div class="promo-cta">{{ t.home.promoCta }}</div>
    </div>
  </a>
</div>
