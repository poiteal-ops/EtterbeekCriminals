@let t = translation.t();

<div class="page">
  <div class="title">{{ t.blog.title }}</div>
  <div class="subtitle">{{ t.blog.subtitle }}</div>

  <div class="posts">
    @for (post of t.blogPosts; track post.case) {
      <div class="post">
        <div class="meta">
          <div>{{ post.date }}</div>
          <div class="case">{{ post.case }}</div>
        </div>
        <div class="content">
          <div class="post-title">{{ post.title }}</div>
          <div class="post-body">{{ post.body }}</div>
        </div>
        @if (post.image) {
          <div class="photo">
            <img [src]="post.image" [alt]="post.title" />
          </div>
        }
      </div>
    }
  </div>
</div>
