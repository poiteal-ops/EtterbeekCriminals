@let t = translation.t();

<div class="page">
  <div class="kicker">{{ t.story.kicker }}</div>
  <div class="title">{{ t.story.title }}</div>

  <div class="exhibit">
    <div class="photo">
      <img src="assets/images/beach-walk.jpg" alt="Le Criminel on a walk" />
    </div>
    <div class="caption">{{ t.story.exhibit }}</div>
  </div>

  <div class="body">
    <p>{{ t.story.p1 }}</p>
    <p>{{ t.story.p2 }}</p>
    <p>{{ t.story.p3 }}</p>
    <p>{{ t.story.p4 }}</p>
  </div>

  <div class="footer">{{ t.story.footer }}</div>
</div>
